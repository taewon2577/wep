<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 - VoyageLuxe</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-container {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: var(--spacing-8);
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--color-bg);
      text-shadow: 2px 2px 0 var(--color-border), -1px -1px 0 var(--color-border), 1px -1px 0 var(--color-border), -1px 1px 0 var(--color-border), 1px 1px 0 var(--color-border);
      margin-bottom: var(--spacing-4);
      letter-spacing: -4px;
    }
    .error-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: var(--spacing-4);
    }
    .error-desc {
      color: var(--color-text-muted);
      font-size: 1.125rem;
      margin-bottom: var(--spacing-8);
      line-height: 1.6;
      max-width: 500px;
    }
  </style>
</head>
<body style="background-color: var(--color-surface);">

  <site-header></site-header>

  <main class="animate-fade-in">
    <div class="error-container container">
      <div class="error-code">404</div>
      <h1 class="error-title">지도에 없는 목적지에 도착하셨습니다.</h1>
      <p class="error-desc">
        요청하신 페이지의 주소가 변경되었거나 삭제되었을 수 있습니다. <br>
        올바른 경로로 다시 안내해 드리겠습니다.
      </p>
      <div class="d-flex gap-4">
        <button class="btn btn-outline" onclick="history.back()">뒤로 가기</button>
        <button class="btn btn-primary" onclick="window.location.href='index.html'">홈으로 돌아가기</button>
      </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
