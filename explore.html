<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행지 탐색 - VoyageLuxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--color-bg);">

  <site-header></site-header>

  <main style="padding: var(--spacing-8) 0;">
    <div class="container">
      <div class="d-flex justify-between align-center" style="margin-bottom: var(--spacing-8);">
        <div>
          <h1 id="pageTitle">여행지 탐색</h1>
          <p style="color: var(--color-text-muted);">다음 여정을 위한 완벽한 장소를 찾아보세요.</p>
        </div>
        <div class="d-flex gap-4 align-center">
          <label style="font-weight: 600; font-size: 0.875rem;">정렬 기준:</label>
          <select id="sortSelect" class="input-field" style="padding: 0.5rem; min-width: 150px;" onchange="applyFilters()">
            <option value="">추천순</option>
            <option value="price_asc">가격 낮은 순</option>
            <option value="price_desc">가격 높은 순</option>
            <option value="rating">평점순</option>
          </select>
        </div>
      </div>

      <div class="explore-layout">
        <!-- Sidebar Filters -->
        <aside class="sidebar-filter animate-fade-in">
          
          <div class="filter-section">
            <h3 class="filter-title">테마</h3>
            <div class="checkbox-group" id="themeFilters">
              <label class="checkbox-label"><input type="radio" name="theme" value="" checked> 전체 테마</label>
              <label class="checkbox-label"><input type="radio" name="theme" value="휴양"> 휴양</label>
              <label class="checkbox-label"><input type="radio" name="theme" value="액티비티"> 액티비티</label>
              <label class="checkbox-label"><input type="radio" name="theme" value="가족여행"> 가족여행</label>
              <label class="checkbox-label"><input type="radio" name="theme" value="로맨스"> 로맨스</label>
            </div>
          </div>

          <button class="btn btn-primary btn-block" onclick="applyFilters()">필터 적용</button>
        </aside>

        <!-- Results Grid -->
        <div id="results-grid" class="grid grid-cols-3">
          <p style="grid-column: span 3; text-align: center; color: var(--color-text-muted);">검색 결과를 불러오는 중입니다...</p>
        </div>
      </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      currentQuery = params.get('query') || '';
      const themeParam = params.get('theme') || '';

      if (themeParam) {
        document.getElementById('pageTitle').innerText = `'${themeParam}' 테마 여행지`;
        const radios = document.querySelectorAll('input[name="theme"]');
        radios.forEach(r => {
          if (r.value === themeParam) r.checked = true;
        });
      }

      applyFilters();
    });

    async function applyFilters() {
      const grid = document.getElementById('results-grid');
      grid.innerHTML = '<p style="grid-column: span 3; text-align: center; color: var(--color-text-muted);">로딩 중...</p>';
      
      const themeNode = document.querySelector('input[name="theme"]:checked');
      const theme = themeNode ? themeNode.value : '';
      const sort = document.getElementById('sortSelect').value;

      const pageTitle = document.getElementById('pageTitle');
      if (theme) {
        pageTitle.innerText = `'${theme}' 테마 여행지`;
      } else {
        pageTitle.innerText = '여행지 탐색';
      }

      const filters = {
        query: currentQuery,
        theme: theme,
        isSpecialOffer: false, // Standard explore page = no special offers
        sort: sort
      };

      const destinations = await window.API.getDestinations(filters);
      
      if (destinations.length === 0) {
        grid.innerHTML = '<p style="grid-column: span 3; text-align: center; color: var(--color-text-muted);">조건에 맞는 여행지가 없습니다.</p>';
        return;
      }

      grid.innerHTML = destinations.map(d => `
        <tour-card
          image="${d.image}"
          title="${d.title}"
          desc="${d.desc}"
          price="₩${d.price.toLocaleString()}"
          original-price="${d.originalPrice ? '₩'+d.originalPrice.toLocaleString() : ''}"
          discount="${d.discount || ''}"
          rating="${d.rating}"
          duration="${d.duration}일"
          link="${d.link}?id=${d.id}"
        ></tour-card>
      `).join('');
    }
  </script>
</body>
</html>
